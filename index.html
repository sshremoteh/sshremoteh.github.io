<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Control Panel</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ── Шрифт терминала ── */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

    * { box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      background: #0a0a0a;
      color: #00ff41;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Анимация мигающего курсора */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    .cursor { animation: blink 1s step-start infinite; }

    /* Скроллбар в стиле терминала */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #00ff4166; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #00ff41aa; }

    /* Поле ввода команды */
    #cmd-input {
      background: transparent;
      border: none;
      outline: none;
      color: #00ff41;
      font-family: inherit;
      font-size: 0.875rem;
      caret-color: #00ff41;
      width: 100%;
    }

    /* Строки в истории терминала */
    .line-prompt  { color: #00ff41; }
    .line-output  { color: #b0ffb0; white-space: pre-wrap; word-break: break-all; }
    .line-system  { color: #888; font-style: italic; }
    .line-error   { color: #ff5555; }
    .line-success { color: #50fa7b; }

    /* Индикатор статуса */
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-online  { background: #50fa7b; box-shadow: 0 0 8px #50fa7b; }
    .status-offline { background: #ff5555; box-shadow: 0 0 8px #ff5555; }
    .status-pending { background: #f1fa8c; box-shadow: 0 0 8px #f1fa8c; animation: blink 1s infinite; }

    /* Кнопки быстрых команд */
    .quick-btn {
      background: #0d1a0d;
      border: 1px solid #00ff4133;
      color: #00ff41;
      font-family: inherit;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .quick-btn:hover {
      background: #00ff4115;
      border-color: #00ff41;
    }
    .quick-btn:active { transform: scale(0.96); }
    .quick-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Scan-line эффект (тонкая ретро-полоса) */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* Панель подключения */
    #connect-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0aee;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .connect-box {
      border: 1px solid #00ff4155;
      background: #0d150d;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      border-radius: 8px;
    }
    .connect-box input {
      background: #0a0a0a;
      border: 1px solid #00ff4144;
      color: #00ff41;
      font-family: inherit;
      font-size: 0.875rem;
      padding: 8px 12px;
      width: 100%;
      border-radius: 4px;
      outline: none;
      margin-top: 4px;
    }
    .connect-box input:focus { border-color: #00ff41; }
    .connect-btn {
      background: #00ff4122;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: inherit;
      font-size: 0.875rem;
      padding: 8px 20px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin-top: 1rem;
      transition: background 0.15s;
    }
    .connect-btn:hover { background: #00ff4133; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     ОВЕРЛЕЙ ПОДКЛЮЧЕНИЯ (показывается если
     в URL нет параметров room= и auth=)
════════════════════════════════════════════ -->
<div id="connect-overlay" style="display:none;">
  <div class="connect-box">
    <div class="text-green-400 text-lg font-bold mb-1">⌨ Remote Control</div>
    <div class="text-gray-500 text-xs mb-6">Введите параметры подключения</div>

    <label class="text-gray-400 text-xs">ID комнаты (room)</label>
    <input id="inp-room" type="text" placeholder="например: a3f9c1b2d8e0" spellcheck="false" />

    <label class="text-gray-400 text-xs mt-3 block">Токен авторизации (auth)</label>
    <input id="inp-auth" type="password" placeholder="ваш пароль" />

    <label class="text-gray-400 text-xs mt-3 block">WebSocket брокер</label>
    <input id="inp-broker" type="text" placeholder="wss://..." spellcheck="false" />

    <button class="connect-btn" onclick="manualConnect()">[ ПОДКЛЮЧИТЬСЯ ]</button>
    <div id="connect-error" class="text-red-400 text-xs mt-2 text-center" style="display:none;"></div>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     ШАПКА
════════════════════════════════════════════ -->
<header class="flex items-center justify-between px-4 py-2 border-b border-green-900"
        style="background:#060f06; flex-shrink:0;">
  <div class="flex items-center gap-3">
    <span class="text-green-400 font-bold text-sm">⌨ REMOTE CTRL</span>
    <span class="text-gray-600 text-xs hidden sm:inline">|</span>
    <span id="room-label" class="text-gray-500 text-xs hidden sm:inline">room: —</span>
  </div>

  <!-- Статус устройства -->
  <div class="flex items-center gap-2">
    <div id="status-dot" class="status-dot status-pending"></div>
    <span id="status-text" class="text-xs text-yellow-400">Инициализация...</span>
  </div>
</header>


<!-- ═══════════════════════════════════════════
     КНОПКИ БЫСТРЫХ КОМАНД
════════════════════════════════════════════ -->
<div class="flex items-center gap-2 flex-wrap px-4 py-2 border-b border-green-900"
     style="background:#070f07; flex-shrink:0;">
  <span class="text-gray-600 text-xs mr-1">Быстрые команды:</span>

  <button class="quick-btn" onclick="quickCmd('curl -s ifconfig.me || wget -qO- ifconfig.me')"
          title="Внешний IP">🌐 IP</button>

  <button class="quick-btn" onclick="quickCmd('df -h')"
          title="Свободное место на дисках">💾 Диск</button>

  <button class="quick-btn" onclick="quickCmd('ps aux --sort=-%cpu | head -20 || tasklist /FO TABLE 2>nul | head -20')"
          title="Список процессов">📋 Процессы</button>

  <button class="quick-btn" onclick="quickCmd('uptime || net statistics workstation 2>nul | findstr \"since\"')"
          title="Время работы системы">⏱ Аптайм</button>

  <button class="quick-btn" onclick="quickCmd('free -h || wmic OS get FreePhysicalMemory /Value 2>nul')"
          title="Использование RAM">🧠 RAM</button>

  <button class="quick-btn" onclick="quickCmd('uname -a || ver')"
          title="Версия ОС">🖥 ОС</button>

  <button class="quick-btn" onclick="quickCmd('whoami')"
          title="Текущий пользователь">👤 Кто я</button>

  <button class="quick-btn" onclick="quickCmd('ping -c 4 8.8.8.8 || ping 8.8.8.8 -n 4')"
          title="Пинг до Google DNS">📡 Пинг</button>
</div>


<!-- ═══════════════════════════════════════════
     ОКНО ТЕРМИНАЛА
════════════════════════════════════════════ -->
<div id="terminal"
     class="flex-1 overflow-y-auto px-4 py-3 text-sm leading-relaxed"
     style="min-height:0;">
  <!-- Строки добавляются сюда через JS -->
</div>


<!-- ═══════════════════════════════════════════
     СТРОКА ВВОДА
════════════════════════════════════════════ -->
<div class="flex items-center gap-2 px-4 py-3 border-t border-green-900"
     style="background:#060f06; flex-shrink:0;">
  <span class="text-green-500 text-sm font-bold select-none">❯</span>
  <input id="cmd-input"
         type="text"
         placeholder="введите команду..."
         autocomplete="off"
         spellcheck="false"
         onkeydown="handleInputKey(event)" />
  <span class="cursor text-green-400 select-none">▌</span>
</div>


<!-- ═══════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════ -->
<script>
// ────────────────────────────────────────────
//  СОСТОЯНИЕ
// ────────────────────────────────────────────

let ws          = null;       // WebSocket-соединение
let roomId      = '';         // ID комнаты
let authToken   = '';         // Токен авторизации
let brokerUrl   = '';         // URL брокера
let isOnline    = false;      // Онлайн ли устройство
let pingTimer   = null;       // Таймер пинга
let pongTimeout = null;       // Таймер ожидания понга
let cmdHistory  = [];         // История команд
let historyPos  = -1;         // Позиция в истории

// Брокер по умолчанию (должен совпадать с client.py)
const DEFAULT_BROKER = 'wss://ws.postman-echo.com/raw';

// Интервал пинга (мс)
const PING_INTERVAL  = 5000;
const PONG_TIMEOUT   = 4000;


// ────────────────────────────────────────────
//  ИНИЦИАЛИЗАЦИЯ — читаем параметры из URL
// ────────────────────────────────────────────

(function init() {
  const params = new URLSearchParams(window.location.search);
  roomId     = params.get('room')   || '';
  authToken  = params.get('auth')   || '';
  brokerUrl  = params.get('broker') || DEFAULT_BROKER;

  if (roomId && authToken) {
    // Параметры есть в URL — запускаем автоматически
    document.getElementById('room-label').textContent = `room: ${roomId}`;
    document.title = `RC · ${roomId}`;
    startWebSocket();
  } else {
    // Показываем форму ручного подключения
    const overlay = document.getElementById('connect-overlay');
    overlay.style.display = 'flex';
    document.getElementById('inp-broker').value = DEFAULT_BROKER;
  }

  // Фокус на поле ввода команды
  document.getElementById('cmd-input').focus();
})();


// ────────────────────────────────────────────
//  ПОДКЛЮЧЕНИЕ ВРУЧНУЮ (через форму)
// ────────────────────────────────────────────

function manualConnect() {
  roomId    = document.getElementById('inp-room').value.trim();
  authToken = document.getElementById('inp-auth').value.trim();
  brokerUrl = document.getElementById('inp-broker').value.trim() || DEFAULT_BROKER;

  const errEl = document.getElementById('connect-error');
  if (!roomId || !authToken) {
    errEl.textContent = 'Введите ID комнаты и токен.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  // Обновляем URL (без перезагрузки)
  const newUrl = `${location.pathname}?room=${roomId}&auth=${encodeURIComponent(authToken)}&broker=${encodeURIComponent(brokerUrl)}`;
  history.replaceState(null, '', newUrl);

  document.getElementById('room-label').textContent = `room: ${roomId}`;
  document.title = `RC · ${roomId}`;

  document.getElementById('connect-overlay').style.display = 'none';
  startWebSocket();
}


// ────────────────────────────────────────────
//  WEBSOCKET
// ────────────────────────────────────────────

function startWebSocket() {
  appendLine(`Подключение к брокеру: ${brokerUrl}`, 'system');
  appendLine(`Комната: ${roomId}`, 'system');
  openWS();
}

function openWS() {
  try {
    ws = new WebSocket(brokerUrl);
  } catch(e) {
    appendLine(`Ошибка создания WebSocket: ${e.message}`, 'error');
    scheduleReconnect();
    return;
  }

  ws.onopen = () => {
    appendLine('✓ Соединение с брокером установлено. Ожидание устройства...', 'success');
    // Регистрируемся в комнате как "panel" (веб-интерфейс)
    wsSend({ type: 'join', room: roomId, role: 'panel' });
    // Запускаем пинги
    startPing();
  };

  ws.onmessage = (event) => {
    handleWsMessage(event.data);
  };

  ws.onerror = (err) => {
    appendLine('Ошибка WebSocket-соединения.', 'error');
  };

  ws.onclose = (evt) => {
    appendLine(`Соединение закрыто (код ${evt.code}). Переподключение...`, 'system');
    stopPing();
    setStatus('offline');
    scheduleReconnect();
  };
}

function scheduleReconnect() {
  setTimeout(() => openWS(), 5000);
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}


// ────────────────────────────────────────────
//  ОБРАБОТКА ВХОДЯЩИХ СООБЩЕНИЙ
// ────────────────────────────────────────────

function handleWsMessage(raw) {
  let data;
  try {
    data = JSON.parse(raw);
  } catch(e) {
    return; // Не наш пакет
  }

  // Фильтруем по комнате
  if (data.room !== roomId) return;

  switch(data.type) {

    case 'pong':
      // Устройство ответило на пинг — оно онлайн
      clearTimeout(pongTimeout);
      pongTimeout = null;
      setStatus('online');
      break;

    case 'output':
      // Вывод команды от устройства
      renderOutput(data.cmd, data.output, data.ts);
      break;

    case 'join':
      // Кто-то подключился к комнате
      if (data.role === 'device') {
        appendLine('✓ Устройство подключилось к комнате.', 'success');
        setStatus('online');
      }
      break;

    default:
      // Неизвестный тип — игнорируем
      break;
  }
}


// ────────────────────────────────────────────
//  ПИНГ / СТАТУС УСТРОЙСТВА
// ────────────────────────────────────────────

function startPing() {
  stopPing();
  pingTimer = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    wsSend({ type: 'ping', room: roomId });

    // Ждём понг PONG_TIMEOUT мс — если нет, считаем оффлайн
    pongTimeout = setTimeout(() => {
      setStatus('offline');
    }, PONG_TIMEOUT);
  }, PING_INTERVAL);
}

function stopPing() {
  clearInterval(pingTimer);
  clearTimeout(pongTimeout);
  pingTimer   = null;
  pongTimeout = null;
}

function setStatus(state) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');

  dot.className = 'status-dot';
  if (state === 'online') {
    dot.classList.add('status-online');
    text.textContent = 'Онлайн';
    text.className   = 'text-xs text-green-400';
    isOnline = true;
    setQuickBtnsEnabled(true);
  } else if (state === 'offline') {
    dot.classList.add('status-offline');
    text.textContent = 'Оффлайн';
    text.className   = 'text-xs text-red-400';
    isOnline = false;
    setQuickBtnsEnabled(false);
  } else {
    dot.classList.add('status-pending');
    text.textContent = 'Ожидание...';
    text.className   = 'text-xs text-yellow-400';
    isOnline = false;
    setQuickBtnsEnabled(false);
  }
}

function setQuickBtnsEnabled(enabled) {
  document.querySelectorAll('.quick-btn').forEach(b => b.disabled = !enabled);
}


// ────────────────────────────────────────────
//  ОТПРАВКА КОМАНД
// ────────────────────────────────────────────

function sendCommand(cmd) {
  if (!cmd.trim()) return;

  // Добавляем в историю
  cmdHistory.unshift(cmd);
  if (cmdHistory.length > 100) cmdHistory.pop();
  historyPos = -1;

  // Выводим в терминал
  appendLine(`❯ ${cmd}`, 'prompt');

  // Если не подключены — предупреждаем
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    appendLine('Нет соединения с брокером.', 'error');
    return;
  }
  if (!isOnline) {
    appendLine('Устройство оффлайн. Команда может не выполниться.', 'error');
  }

  wsSend({
    type: 'command',
    room: roomId,
    auth: authToken,
    cmd:  cmd,
    ts:   new Date().toISOString(),
  });
}

// Быстрая команда из кнопки
function quickCmd(cmd) {
  document.getElementById('cmd-input').value = '';
  sendCommand(cmd);
}


// ────────────────────────────────────────────
//  ВВОД С КЛАВИАТУРЫ
// ────────────────────────────────────────────

function handleInputKey(event) {
  const input = document.getElementById('cmd-input');

  if (event.key === 'Enter') {
    const cmd = input.value.trim();
    input.value = '';
    sendCommand(cmd);
    return;
  }

  // Навигация по истории командой ↑/↓
  if (event.key === 'ArrowUp') {
    event.preventDefault();
    if (historyPos < cmdHistory.length - 1) {
      historyPos++;
      input.value = cmdHistory[historyPos];
      // Курсор в конец
      setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
    }
  }
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    if (historyPos > 0) {
      historyPos--;
      input.value = cmdHistory[historyPos];
    } else {
      historyPos = -1;
      input.value = '';
    }
  }

  // Ctrl+L — очистить терминал
  if (event.key === 'l' && event.ctrlKey) {
    event.preventDefault();
    clearTerminal();
  }
}


// ────────────────────────────────────────────
//  РЕНДЕР ТЕРМИНАЛА
// ────────────────────────────────────────────

function appendLine(text, type = 'output') {
  const terminal = document.getElementById('terminal');
  const div = document.createElement('div');
  div.className = `line-${type}`;
  div.textContent = text;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function renderOutput(cmd, output, ts) {
  // Метка времени
  const time = ts ? new Date(ts).toLocaleTimeString('ru-RU') : '';
  if (time) appendLine(`  [${time}]`, 'system');

  // Сам вывод (может быть многострочным)
  if (output) {
    const div = document.createElement('div');
    div.className = 'line-output';
    div.textContent = output;
    document.getElementById('terminal').appendChild(div);
  }

  // Пустая строка-разделитель
  appendLine('', 'output');

  document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
}

function clearTerminal() {
  document.getElementById('terminal').innerHTML = '';
  appendLine('Терминал очищен. (Ctrl+L)', 'system');
}


// ────────────────────────────────────────────
//  СТАРТОВЫЕ СООБЩЕНИЯ
// ────────────────────────────────────────────

appendLine('╔══════════════════════════════════════════╗', 'system');
appendLine('║         REMOTE CONTROL PANEL  v1.0       ║', 'system');
appendLine('╚══════════════════════════════════════════╝', 'system');
appendLine('Ctrl+L — очистить терминал  |  ↑/↓ — история', 'system');
appendLine('', 'output');
</script>
</body>
</html>
